<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Producto</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <div class="imagenes-container">
            <div class="miniaturas">
                <img id="miniatura1" src="" alt="Miniatura 1">
                <img id="miniatura2" src="" alt="Miniatura 2">
                <img id="miniatura3" src="" alt="Miniatura 3">
                <img id="miniatura4" src="" alt="Miniatura 4">
            </div>
            <div class="imagen-principal-wrapper">
                <button class="arrow" id="prev-arrow">&lt;</button>
                <img id="imagenPrincipal" src="" alt="Imagen principal">
                <button class="arrow" id="next-arrow">&gt;</button>
            </div>
        </div>
        
        <div class="info-container">
            <h2 id="product-name"></h2>
            <p id="product-description"></p>
            <p id="product-price"></p>
            <p id="product-soldCount"></p>

            <div class="botones-container">
                <button id="add-to-cart-btn">Carrito</button>
                <button id="buy-now-btn">Comprar</button>
            </div>
        </div>
    </main>
    
   <script src="init.js"></script> 
    <script src="productos_detalle.js"></script>
</body>
</html>
